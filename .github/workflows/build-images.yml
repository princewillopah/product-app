name: Build & Push Images to Docker Hub

# Triggers
on:
  push:
    branches:
      - main
    paths:
      - 'images/**'
      - '.github/workflows/build-images.yml'
      # NOTE: 'charts/**' is deliberately NOT a trigger. CI writes the image tag
      # back into charts/product-app/values.yaml, and triggering on charts/**
      # would make the pipeline retrigger itself forever. Manifest-only edits
      # should not rebuild images anyway.
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_PREFIX: product-app-

jobs:
  build-matrix:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - order-service
          - analytics-service
          - product-service
          - api-gateway
          - frontend
    permissions:
      contents: read

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-describe

      # 2. Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Extract metadata (tags, labels)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PREFIX }}${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          # Output tags:
          # - docker.io/namespace/product-app-order-service:main
          # - docker.io/namespace/product-app-order-service:main-abc123
          # - docker.io/namespace/product-app-order-service:abc123
          # - docker.io/namespace/product-app-order-service:latest (on main branch)

      # 5. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./images/${{ matrix.service }}
          file: ./images/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Metadata labels:
          # - org.opencontainers.image.created
          # - org.opencontainers.image.revision
          # - org.opencontainers.image.version

      # 6. Log image details
      - name: Log image build success
        run: |
          echo "✅ Built and pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PREFIX }}${{ matrix.service }}"
          echo "📦 Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'

  # ============================================================================
  # Validation & Smoke Tests
  # ============================================================================
  validate:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    needs: build-matrix
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      # Render + lint both Helm charts. Chart dependencies are vendored
      # (charts/*/charts/*.tgz committed to Git), so this runs fully offline
      # with no helm repo access. This is what replaced the old Kustomize +
      # kubeval validation when the repo moved to Helm + ArgoCD.
      - name: Helm lint & template (render smoke test)
        run: |
          for chart in charts/product-app charts/observability; do
            echo "==> $chart"
            helm lint "$chart"
            helm template release "$chart" >/dev/null
          done

      - name: Lint ArgoCD manifests
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint
          # comments-indentation is disabled on purpose: the staging/prod blocks in
          # the ApplicationSet are commented out at list-item indentation so they
          # stay uncomment-ready, which that rule would otherwise flag.
          yamllint -d '{extends: default, rules: {line-length: disable, comments: {min-spaces-from-content: 1}, comments-indentation: disable, document-start: disable, truthy: disable}}' \
            argocd-apps/*.yaml k8s/argocd/appproject.yaml

  # ============================================================================
  # GitOps Write-Back: pin the new image tag in Git (pull model)
  # ----------------------------------------------------------------------------
  # Instead of pushing to the cluster (which would need cluster credentials in
  # CI), we commit the freshly-built image's SHA tag into
  # charts/product-app/values.yaml (global.image.tag). ArgoCD watches Git and
  # pulls the change on its own. CI never touches the cluster, tags are
  # immutable, and rollback is just `git revert`.
  # ============================================================================
  update-manifests:
    name: Write Image Tag Back to Git
    runs-on: ubuntu-latest
    needs: [build-matrix, validate]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write   # lets the default GITHUB_TOKEN push the tag-bump commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # stay on the branch (not detached HEAD) so we can push

      - name: Compute immutable image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"   # 7 chars == docker/metadata-action's sha tag

      - name: Pin image tag in Helm values
        run: |
          yq -i ".global.image.tag = \"${{ steps.tag.outputs.sha }}\"" charts/product-app/values.yaml
          echo "Pinned global.image.tag:"
          yq '.global.image' charts/product-app/values.yaml

      - name: Commit & push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- charts/product-app/values.yaml; then
            echo "No tag change — nothing to commit."
            exit 0
          fi
          git add charts/product-app/values.yaml
          git commit -m "chore(deploy): release ${{ steps.tag.outputs.sha }} [skip ci]"
          git push   # GITHUB_TOKEN pushes do NOT retrigger workflows (extra loop guard)

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-matrix, validate, update-manifests]
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "🎯 Build Summary"
          echo "==============="
          echo "Workflow: ${{ github.workflow }}"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Author: ${{ github.actor }}"
          echo ""
          echo "📦 Images built:"
          echo "  - order-service"
          echo "  - analytics-service"
          echo "  - product-service"
          echo "  - api-gateway"
          echo "  - frontend"
          echo ""
          echo "🔗 Registry: ${{ env.REGISTRY }}"
          echo "📍 Namespace: ${{ env.IMAGE_NAMESPACE }}"
          echo ""
          echo "✅ All images pushed to Docker Hub"
          echo "✅ Helm charts linted & rendered"
          echo "✅ Image tag written back to Git — ArgoCD will pull & deploy"

