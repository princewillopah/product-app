---
# ArgoCD ApplicationSet for Multi-Cluster Service Deployments
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: product-app-services-multi-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/name: product-app-services-appset
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true

  generators:
    - list:
        elements:
          - cluster: dev
            environment: development
            url: https://kubernetes.default.svc   # this Kind cluster, where ArgoCD itself runs
            namespace: product-app
          # staging/prod are NOT registered clusters yet. Each block stays
          # commented until you run `argocd cluster add <context>` for a real
          # cluster; otherwise the ApplicationSet errors with "cluster not found".
          # - cluster: staging
          #   environment: staging
          #   url: https://staging-cluster:6443
          #   namespace: product-app
          # - cluster: prod
          #   environment: production
          #   url: https://prod-cluster:6443
          #   namespace: product-app

  template:
    metadata:
      name: "product-app-services-{{ .cluster }}"
      namespace: argocd
      labels:
        cluster: "{{ .cluster }}"
        environment: "{{ .environment }}"
        app.kubernetes.io/managed-by: argocd

    spec:
      project: product-app

      source:
        repoURL: https://github.com/princewillopah/product-app.git
        targetRevision: main
        path: charts/product-app
        helm:
          releaseName: product-app
          valueFiles:
            - values.yaml
          # Per-environment overlays: when you register staging/prod clusters,
          # add charts/product-app/values-<env>.yaml and append it to valueFiles
          # (ArgoCD layers them in order, last file wins).

      destination:
        server: "{{ .url }}"
        namespace: "{{ .namespace }}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false

        syncOptions:
          - CreateNamespace=true
          - PruneLast=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

---
# ArgoCD ApplicationSet for Multi-Cluster Observability Deployments
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: product-app-observability-multi-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/name: product-app-observability-appset
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - list:
        elements:
          - cluster: dev
            environment: development
            url: https://kubernetes.default.svc   # this Kind cluster, where ArgoCD itself runs
            namespace: observability-stack
          # staging/prod are NOT registered clusters yet. Each block stays
          # commented until you run `argocd cluster add <context>` for a real
          # cluster; otherwise the ApplicationSet errors with "cluster not found".
          # - cluster: staging
          #   environment: staging
          #   url: https://staging-cluster:6443
          #   namespace: observability-stack
          # - cluster: prod
          #   environment: production
          #   url: https://prod-cluster:6443
          #   namespace: observability-stack
  template:
    metadata:
      name: "product-app-observability-{{ .cluster }}"
      namespace: argocd
      labels:
        cluster: "{{ .cluster }}"
        environment: "{{ .environment }}"
        app.kubernetes.io/managed-by: argocd
    spec:
      project: product-app
      source:
        repoURL: https://github.com/princewillopah/product-app.git
        targetRevision: main
        path: charts/observability
        helm:
          releaseName: observability
          valueFiles:
            - values.yaml
          # Per-environment overlays: when you register staging/prod clusters,
          # add charts/observability/values-<env>.yaml and append it to valueFiles
          # (ArgoCD layers them in order, last file wins).
      destination:
        server: "{{ .url }}"
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          # kube-prometheus-stack ships CRDs (prometheuses/alertmanagers) whose
          # schema exceeds the 262KB client-side-apply annotation limit. Without
          # server-side apply the sync fails: "metadata.annotations: Too long".
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
