{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled | default true }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "product-app.labels" (dict "ctx" $ "name" $name) | nindent 4 }}
{{- end }}
{{- end }}
