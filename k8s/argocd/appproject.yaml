apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: product-app
  namespace: argocd
spec:
  description: Product App multi-cluster deployments
  sourceRepos:
    - https://github.com/princewillopah/product-app.git
  destinations:
    - server: '*'
      namespace: product-app
    - server: '*'
      namespace: observability-stack
    - server: '*'
      namespace: argocd
    # kube-prometheus-stack places control-plane scrape Services (kubelet,
    # coredns) in kube-system. ArgoCD must be allowed to manage that namespace
    # or the observability sync fails: "namespace kube-system is not permitted".
    - server: '*'
      namespace: kube-system
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
