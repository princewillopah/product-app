---
# Namespace for observability stack (Prometheus, Loki, Tempo, Grafana, AlertManager)
apiVersion: v1
kind: Namespace
metadata:
  name: observability-stack
  labels:
    name: observability-stack
    app.kubernetes.io/name: observability
    app.kubernetes.io/version: "v1"
    environment: production
  annotations:
    description: "Observability stack - Prometheus, Loki, Tempo, Grafana, AlertManager, OTEL Collector"

---
# Namespace for application services
apiVersion: v1
kind: Namespace
metadata:
  name: product-app
  labels:
    name: product-app
    app.kubernetes.io/name: product-app
    app.kubernetes.io/version: "v1"
    environment: production
  annotations:
    description: "Product application services - order, analytics, product, api-gateway"

---
# Namespace for ArgoCD (GitOps control plane)
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    name: argocd
    app.kubernetes.io/name: argocd
    app.kubernetes.io/version: "v1"
    environment: production
  annotations:
    description: "ArgoCD - GitOps continuous deployment"

