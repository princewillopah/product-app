---
# Production Alert Rules - PrometheusRule CRD
# Prometheus Operator will reconcile these into Prometheus configuration
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: product-app-alerts
  namespace: observability-stack
  labels:
    app.kubernetes.io/name: product-app
    environment: production
spec:
  groups:
    # ========================================================================
    # GROUP 1: SERVICE HEALTH ALERTS
    # ========================================================================
    - name: service-health
      interval: 30s
      rules:
        # ====================================================================
        # CRITICAL: Service Down - Page Immediately
        # ====================================================================
        - alert: ServiceDown
          expr: |
            (up{job=~"order-service|analytics-service|product-service|api-gateway"} == 0)
          for: 30s  # Immediate alert for development, 2m+ for production
          labels:
            severity: critical
            team: platform
            slo: availability
            pagerduty: "true"
          annotations:
            summary: "{{ $labels.job }} is DOWN"
            description: |
              Service {{ $labels.job }} in namespace {{ $labels.kubernetes_namespace }} 
              has been unreachable for the last 30 seconds.
              
              **Impact**: Production outage
              **Action**: Check service logs, deployment status, and resource constraints
              **Runbook**: https://wiki.company.com/runbook/service-down
            dashboard: "http://grafana.observability-stack:3000/d/service-health"

        # ====================================================================
        # CRITICAL: High 5xx Error Rate - Page & Escalate
        # ====================================================================
        - alert: HighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
              /
              sum(rate(http_requests_total[5m])) by (job)
            ) > 0.05
          for: 1m
          labels:
            severity: critical
            team: platform
            slo: reliability
            pagerduty: "true"
          annotations:
            summary: "{{ $labels.job }} high 5xx error rate"
            description: |
              {{ $labels.job }} has error rate > 5% (current: {{ printf "%.2f" $value }})
              over the last 5 minutes.
              
              **Impact**: Service unreliability, customer-facing errors
              **Action**: Check application logs, database connectivity, downstream service health
              **Runbook**: https://wiki.company.com/runbook/high-error-rate
            dashboard: "http://grafana.observability-stack:3000/d/error-rates"

        # ====================================================================
        # WARNING: High Latency (P95 > 1 second)
        # ====================================================================
        - alert: HighLatencyP95
          expr: |
            (
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job))
            ) > 1.0
          for: 2m
          labels:
            severity: warning
            team: platform
            slo: latency
          annotations:
            summary: "{{ $labels.job }} high P95 latency"
            description: |
              {{ $labels.job }} P95 latency > 1 second (current: {{ printf "%.2f" $value }}s)
              
              **Impact**: Degraded user experience
              **Action**: Analyze request patterns, database query performance, service dependencies
              **Runbook**: https://wiki.company.com/runbook/high-latency
            dashboard: "http://grafana.observability-stack:3000/d/latency-analysis"

    # ========================================================================
    # GROUP 2: SLO BURN-RATE ALERTS (30-day error budget)
    # ========================================================================
    # SLO Target: 99.9% availability (0.1% error budget)
    # Budget: 0.1% errors / 30 days = 43.2 minutes downtime per month
    #
    # Burn-rate windows detect if we're on track to exhaust the monthly budget:
    # - 5-min window at 1000x rate → 43.2 minutes budget exhausted in 5 min
    # - 1-hour window at 100x rate → 43.2 minutes budget exhausted in 1 hour
    # - 6-hour window at 10x rate → 43.2 minutes budget exhausted in 6 hours
    # - 30-day window at 1x rate → Tracking actual burn
    # ========================================================================
    - name: slo-burn-rate
      interval: 30s
      rules:
        # ====================================================================
        # CRITICAL: SLO Error Burn Rate 5-min (1000x)
        # ====================================================================
        - alert: SLOErrorBurnRateFast
          expr: |
            (
              sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
              /
              (0.001 * sum(rate(http_requests_total[5m])) by (job))
            ) > 1000
          for: 2m
          labels:
            severity: critical
            team: platform
            slo: error-burn-rate
            window: "5m"
            pagerduty: "true"
          annotations:
            summary: "SLO error burn rate FAST ({{ $labels.job }})"
            description: |
              {{ $labels.job }} is exhausting monthly error budget at 1000x rate.
              Monthly budget exhaustion in ~5 minutes if continues.
              
              Current burn rate: {{ printf "%.1f" $value }}x
              Monthly budget: 43.2 minutes (0.1% error budget)
              
              **Impact**: On track to violate SLO within hours
              **Action**: IMMEDIATE incident escalation, root cause analysis
              **Runbook**: https://wiki.company.com/runbook/slo-burn-fast
            dashboard: "http://grafana.observability-stack:3000/d/slo-dashboard"

        # ====================================================================
        # WARNING: SLO Error Burn Rate 1-hour (100x)
        # ====================================================================
        - alert: SLOErrorBurnRateMedium
          expr: |
            (
              sum(rate(http_requests_total{status=~"5.."}[1h])) by (job)
              /
              (0.001 * sum(rate(http_requests_total[1h])) by (job))
            ) > 100
          for: 15m
          labels:
            severity: warning
            team: platform
            slo: error-burn-rate
            window: "1h"
          annotations:
            summary: "SLO error burn rate MEDIUM ({{ $labels.job }})"
            description: |
              {{ $labels.job }} error burn rate 100x (exhausts budget in ~1 hour).
              
              Current burn rate: {{ printf "%.1f" $value }}x
              
              **Impact**: Will violate SLO if sustained for >1 hour
              **Action**: Create incident, investigate error source
              **Runbook**: https://wiki.company.com/runbook/slo-burn-medium
            dashboard: "http://grafana.observability-stack:3000/d/slo-dashboard"

        # ====================================================================
        # INFO: SLO Error Burn Rate 6-hour (10x) - Slow Leak Detection
        # ====================================================================
        - alert: SLOErrorBurnRateSlow
          expr: |
            (
              sum(rate(http_requests_total{status=~"5.."}[6h])) by (job)
              /
              (0.001 * sum(rate(http_requests_total[6h])) by (job))
            ) > 10
          for: 1h
          labels:
            severity: info
            team: platform
            slo: error-burn-rate
            window: "6h"
          annotations:
            summary: "SLO error burn rate SLOW ({{ $labels.job }})"
            description: |
              {{ $labels.job }} error burn rate 10x (exhausts budget in ~6 hours).
              Slow leak indicating sustained minor issues.
              
              Current burn rate: {{ printf "%.1f" $value }}x
              
              **Impact**: Gradual SLO exhaustion
              **Action**: Investigation ticket for next sprint, monitor closely
              **Runbook**: https://wiki.company.com/runbook/slo-burn-slow
            dashboard: "http://grafana.observability-stack:3000/d/slo-dashboard"

        # ====================================================================
        # CRITICAL: Monthly SLO Violation (approaching zero budget)
        # ====================================================================
        - alert: SLOMonthlyErrorBudgetWarning
          expr: |
            (
              sum(increase(http_requests_total{status=~"5.."}[30d])) by (job)
              /
              sum(increase(http_requests_total[30d])) by (job)
            ) > 0.0008  # 80% of 0.1% budget already consumed
          for: 10m
          labels:
            severity: warning
            team: platform
            slo: monthly-budget
          annotations:
            summary: "Monthly SLO budget 80% consumed ({{ $labels.job }})"
            description: |
              {{ $labels.job }} has consumed 80% of monthly error budget.
              Only 20% remaining for last 10 days of month.
              
              Current error rate: {{ printf "%.3f" $value }}
              Remaining budget: ~8.6 minutes
              
              **Impact**: Limited budget for incidents
              **Action**: Halt risky deployments, focus on stability
              **Runbook**: https://wiki.company.com/runbook/slo-budget-warning
            dashboard: "http://grafana.observability-stack:3000/d/slo-dashboard"

    # ========================================================================
    # GROUP 3: AVAILABILITY & UPTIME
    # ========================================================================
    - name: availability
      interval: 30s
      rules:
        # ====================================================================
        # WARNING: Service Availability < 99%
        # ====================================================================
        - alert: LowAvailability
          expr: |
            (
              sum(rate(http_requests_total{status!="5.."}[24h])) by (job)
              /
              sum(rate(http_requests_total[24h])) by (job)
            ) < 0.99
          for: 5m
          labels:
            severity: warning
            team: platform
            slo: availability
          annotations:
            summary: "{{ $labels.job }} availability < 99%"
            description: |
              {{ $labels.job }} 24-hour availability {{ printf "%.2f" $value }}%
              
              **Impact**: Approaching SLO violation
              **Action**: Investigate error sources, stabilize service
              **Runbook**: https://wiki.company.com/runbook/low-availability
            dashboard: "http://grafana.observability-stack:3000/d/availability"

    # ========================================================================
    # GROUP 4: INFRASTRUCTURE & DEPENDENCIES
    # ========================================================================
    - name: infrastructure
      interval: 30s
      rules:
        # ====================================================================
        # WARNING: High Memory Usage
        # ====================================================================
        - alert: HighMemoryUsage
          expr: |
            (container_memory_usage_bytes{pod=~"order-service.*|analytics-service.*|product-service.*"}
            / container_spec_memory_limit_bytes) > 0.85
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High memory usage in {{ $labels.pod }}"
            description: |
              Pod {{ $labels.pod }} memory usage {{ printf "%.1f" $value }}% of limit.
              
              **Action**: Increase memory limit, investigate memory leaks
              **Runbook**: https://wiki.company.com/runbook/high-memory

        # ====================================================================
        # WARNING: High CPU Usage
        # ====================================================================
        - alert: HighCPUUsage
          expr: |
            (rate(container_cpu_usage_seconds_total{pod=~"order-service.*|analytics-service.*|product-service.*"}[5m])
            / container_spec_cpu_quota) > 0.85
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High CPU usage in {{ $labels.pod }}"
            description: |
              Pod {{ $labels.pod }} CPU usage {{ printf "%.1f" $value }}% of limit.
              
              **Action**: Optimize code, increase CPU limit, or scale horizontally
              **Runbook**: https://wiki.company.com/runbook/high-cpu

        # ====================================================================
        # CRITICAL: Database Connection Pool Exhausted
        # ====================================================================
        - alert: DBConnectionPoolExhausted
          expr: |
            (increase(db_connections_total{status="waiting"}[5m]) / 
            increase(db_connections_total[5m])) > 0.9
          for: 2m
          labels:
            severity: critical
            team: platform
            pagerduty: "true"
          annotations:
            summary: "Database connection pool exhausted"
            description: |
              Database connection pool {{ printf "%.1f" $value }}% exhausted.
              
              **Action**: Scale database connections, kill idle connections, investigate query issues
              **Runbook**: https://wiki.company.com/runbook/db-connection-pool

    # ========================================================================
    # GROUP 5: OBSERVABILITY STACK HEALTH
    # ========================================================================
    - name: observability
      interval: 30s
      rules:
        # ====================================================================
        # CRITICAL: Prometheus Down
        # ====================================================================
        - alert: PrometheusDown
          expr: up{job="prometheus"} == 0
          for: 1m
          labels:
            severity: critical
            team: platform
            pagerduty: "true"
          annotations:
            summary: "Prometheus is DOWN"
            description: |
              Prometheus server is unreachable. Metrics collection halted.
              
              **Action**: Check Prometheus pod logs, PVC status, restart if needed
              **Runbook**: https://wiki.company.com/runbook/prometheus-down

        # ====================================================================
        # CRITICAL: AlertManager Down
        # ====================================================================
        - alert: AlertmanagerDown
          expr: up{job="alertmanager"} == 0
          for: 1m
          labels:
            severity: critical
            team: platform
            pagerduty: "true"
          annotations:
            summary: "AlertManager is DOWN"
            description: |
              AlertManager server is unreachable. Alerts will not be routed.
              
              **Action**: Check AlertManager pod logs, restart if needed
              **Runbook**: https://wiki.company.com/runbook/alertmanager-down

        # ====================================================================
        # WARNING: Prometheus Scrape Failures
        # ====================================================================
        - alert: PrometheusScrapeFailure
          expr: |
            rate(prometheus_sd_consul_rpc_failures_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Prometheus scrape failures detected"
            description: |
              Prometheus scrape failures rate > 0.
              Check service discovery configuration.
              
              **Action**: Verify ServiceMonitor/PodMonitor config, service DNS
              **Runbook**: https://wiki.company.com/runbook/scrape-failures

