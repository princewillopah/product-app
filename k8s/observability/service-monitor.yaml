---
# ServiceMonitor CRDs - Dynamic Prometheus scrape configuration
# Prometheus Operator automatically discovers and configures scraping from these resources

# ============================================================================
# ORDER SERVICE - ServiceMonitor
# ============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-service-monitor
  namespace: product-app
  labels:
    app: order-service
    release: kube-prometheus-stack
spec:
  # Selector for Service to monitor
  selector:
    matchLabels:
      app: order-service
  
  # Endpoints to scrape (Service ports)
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      scheme: http
      relabelings:
        # Add custom labels
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod_name

