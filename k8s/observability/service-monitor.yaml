---
# ============================================================================
# POD MONITOR - System & Container Metrics
# ============================================================================
# Automatically scrapes all pods in product-app namespace
# Gets: container CPU, memory, disk I/O, network I/O
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: product-app-pod-monitor
  namespace: product-app
  labels:
    app: product-app
    release: kube-prometheus-stack
spec:
  # Selector for pods to monitor
  selector:
    matchLabels:
      monitoring: "true"
  
  # Pod ports to scrape
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod_name
        - sourceLabels: [__meta_kubernetes_pod_label_app]
          targetLabel: application

---
# ============================================================================
# PROMETHEUS OPERATOR - Self-Monitoring
# ============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-operator-monitor
  namespace: observability-stack
  labels:
    app: prometheus-operator
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-operator
  
  endpoints:
    - port: https
      interval: 30s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true

