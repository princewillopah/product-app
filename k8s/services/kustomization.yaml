apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - order-service
  - analytics-service
  - product-service
  - api-gateway

# ---------------------------------------------------------------------------
# Image tag management — the single source of truth for deployed versions.
# ---------------------------------------------------------------------------
# CI (build-images.yml) rewrites every `newTag` below to the 7-char commit SHA
# after it builds & pushes the images, then commits this file back to Git.
# ArgoCD watches Git, sees the change, and deploys the new immutable tags.
# Do NOT pin versions inside the Deployments — change them here.
images:
  - name: docker.io/princewillopah/product-app-order-service
    newTag: latest   # seed value; overwritten by CI with the commit SHA
  - name: docker.io/princewillopah/product-app-analytics-service
    newTag: latest
  - name: docker.io/princewillopah/product-app-product-service
    newTag: latest
  - name: docker.io/princewillopah/product-app-api-gateway
    newTag: latest
